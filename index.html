<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PathLab Pro — Employee Pathology Benefit System</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet" />
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8fafc; margin: 0; }
    * { box-sizing: border-box; }
    /* Extended Tailwind colours used dynamically */
    .bg-rose-50{background:#fff1f2}.text-rose-700{color:#be123c}.border-rose-200{border-color:#fecdd3}
    .bg-blue-50{background:#eff6ff}.text-blue-600{color:#2563eb}.text-blue-700{color:#1d4ed8}.border-blue-200{border-color:#bfdbfe}
    .bg-emerald-50{background:#ecfdf5}.text-emerald-600{color:#059669}.text-emerald-700{color:#047857}.border-emerald-200{border-color:#a7f3d0}.bg-emerald-500{background:#10b981}.bg-emerald-600{background:#059669}.hover\:bg-emerald-700:hover{background:#047857}
    .bg-amber-50{background:#fffbeb}.text-amber-500{color:#f59e0b}.text-amber-600{color:#d97706}.text-amber-700{color:#b45309}.border-amber-200{border-color:#fde68a}.bg-amber-500{background:#f59e0b}.hover\:bg-amber-600:hover{background:#d97706}
    .bg-violet-50{background:#f5f3ff}.text-violet-600{color:#7c3aed}.text-violet-700{color:#6d28d9}.border-violet-200{border-color:#ddd6fe}
    .bg-teal-50{background:#f0fdfa}.text-teal-600{color:#0d9488}.border-teal-200{border-color:#99f6e4}
    .bg-orange-50{background:#fff7ed}.text-orange-600{color:#ea580c}.border-orange-200{border-color:#fed7aa}
    .bg-red-50{background:#fef2f2}.text-red-500{color:#ef4444}.text-red-600{color:#dc2626}.text-red-700{color:#b91c1c}.border-red-200{border-color:#fecaca}.bg-red-600{background:#dc2626}.hover\:bg-red-700:hover{background:#b91c1c}
    .bg-slate-900{background:#0f172a}.hover\:bg-slate-800:hover{background:#1e293b}.bg-slate-300{background:#cbd5e1}
    .bg-slate-700{background:#334155}.text-slate-900{color:#0f172a}
    .accent-slate-900{accent-color:#0f172a}
    .focus\:ring-slate-900:focus{--tw-ring-color:#0f172a}
    .from-slate-900{--tw-gradient-from:#0f172a}.to-slate-700{--tw-gradient-to:#334155}
    .from-slate-50{--tw-gradient-from:#f8fafc}.to-blue-50{--tw-gradient-to:#eff6ff}
    .bg-gradient-to-br{background-image:linear-gradient(to bottom right,var(--tw-gradient-from),var(--tw-gradient-to))}
    .bg-gradient-to-r{background-image:linear-gradient(to right,var(--tw-gradient-from),var(--tw-gradient-to))}
    .from-slate-50.to-violet-50{background:linear-gradient(135deg,#f8fafc,#f5f3ff)}
    .from-slate-50.to-blue-50{background:linear-gradient(135deg,#f8fafc,#eff6ff)}
    input[type=checkbox]{accent-color:#0f172a}
    @media print{
      body>*{display:none!important}
      #__sp__{display:block!important;position:static!important;overflow:visible!important}
      #__sp_toolbar__{display:none!important}
      #__sp_body__{padding:0!important;background:none!important}
      .sp-page{box-shadow:none!important;border-radius:0!important;width:100%!important;padding:0!important}
      @page{size:A4;margin:15mm}
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    // Shim lucide-react icons as simple SVG spans
    window.lucideReact = new Proxy({}, {
      get(_, name) {
        return function Icon({ className = 'w-4 h-4' }) {
          return React.createElement('span', { className, style: { display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:'0.75em',opacity:0.7 } }, '◆');
        };
      }
    });
  </script>
  <script type="text/babel" data-presets="react">
   {
  "version": 2,
  "builds": [{ "src": "index.html", "use": "@vercel/static" }],
  "routes": [{ "src": "/(.*)", "dest": "/index.html" }]
}

    const { useState, useEffect, useMemo, useRef } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, LineChart, Line, Legend, CartesianGrid, Area, AreaChart } = Recharts;

    // Lucide icon stubs
    const makeIcon = (label) => ({ className = 'w-4 h-4', style }) =>
      React.createElement('svg', { className, style, viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2 },
        React.createElement('circle',{cx:12,cy:12,r:10}));
    const LayoutDashboard=makeIcon('LD'), UsersIcon=makeIcon('U'), FileText=makeIcon('FT'),
      FlaskConical=makeIcon('FC'), ClipboardList=makeIcon('CL'), CheckCircle2=makeIcon('CC'),
      XCircle=makeIcon('XC'), Clock=makeIcon('CK'), Printer=makeIcon('PR'), Download=makeIcon('DL'),
      LogOut=makeIcon('LO'), Plus=makeIcon('PL'), Search=makeIcon('SR'), Upload=makeIcon('UP'),
      AlertCircle=makeIcon('AC'), TrendingUp=makeIcon('TU'), Activity=makeIcon('AV'),
      UserCheck=makeIcon('UC'), Stethoscope=makeIcon('ST'), Calendar=makeIcon('CA'),
      Eye=makeIcon('EY'), Trash2=makeIcon('T2'), Edit3=makeIcon('E3'), ChevronRight=makeIcon('CR'),
      ShieldCheck=makeIcon('SC'), FilePlus2=makeIcon('FP'), Microscope=makeIcon('MC'),
      BarChart3=makeIcon('BC'), Lock=makeIcon('LK'), User=makeIcon('UR'), X=makeIcon('X'),
      Check=makeIcon('CH'), AlertTriangle=makeIcon('AT'), FileSpreadsheet=makeIcon('FS'),
      ArrowRight=makeIcon('AR'), Info=makeIcon('IN'), CheckSquare=makeIcon('CS'), Square=makeIcon('SQ'),
      UserIcon=makeIcon('UI');

</script>
</body>
</html>
